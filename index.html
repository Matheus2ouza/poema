<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tudo que eu Sinto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #080b14;
      color: #f5f5f5;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 20px;
    }

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .nebula {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(700px, 100vw);
      height: min(500px, 80vh);
      background: radial-gradient(ellipse at center,
        rgba(120, 40, 180, 0.09) 0%,
        rgba(200, 50, 80, 0.06) 40%,
        transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    .shooting-star {
      position: fixed;
      top: 0; left: 0;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: white;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
    }
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      width: 80px;
      height: 1px;
      background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
    }

    #intro {
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      text-align: center;
      max-width: 800px;
      width: 100%;
      opacity: 0;
      transition: opacity 1s ease;
      white-space: nowrap;
      position: relative;
      z-index: 10;
    }

    #poem {
      font-size: clamp(0.9rem, 3.2vw, 1.2rem);
      display: none;
      white-space: pre-wrap;
      max-width: 680px;
      width: 100%;
      position: relative;
      z-index: 10;
      line-height: 2;
      text-shadow: 0 0 18px rgba(255,200,220,0.3);
      padding: 0 8px;
    }

    .author {
      margin-top: 2rem;
      opacity: 0;
      transition: opacity 1.5s ease;
      font-size: clamp(0.75rem, 2.5vw, 0.95rem);
      color: #c8a0b8;
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      body {
        padding: 24px 16px;
        align-items: flex-start;
        padding-top: 18vh;
      }
      #poem { line-height: 1.9; }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>
  <div class="nebula"></div>
  <div id="intro"></div>
  <div id="poem"></div>

  <script>
    /* ── STARFIELD ── */
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    let stars = [];
    const STAR_COUNT = 320;

    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;

    document.addEventListener('mousemove', e => {
      targetX = (e.clientX / window.innerWidth  - 0.5) * 2;
      targetY = (e.clientY / window.innerHeight - 0.5) * 2;
    });
    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      targetX = (t.clientX / window.innerWidth  - 0.5) * 2;
      targetY = (t.clientY / window.innerHeight - 0.5) * 2;
    }, { passive: true });

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < STAR_COUNT; i++) {
        const layer = Math.floor(Math.random() * 3);
        stars.push({
          x:            Math.random() * canvas.width,
          y:            Math.random() * canvas.height,
          r:            [0.25, 0.7, 1.3][layer] + Math.random() * 0.5,
          twinkleSpeed: Math.random() * 0.012 + 0.003,
          phase:        Math.random() * Math.PI * 2,
          layer,
          parallaxFactor: [0.004, 0.012, 0.025][layer],
          driftSpeed:   [0.04, 0.09, 0.16][layer],
          hue: Math.random() < 0.25
            ? (Math.random() < 0.5 ? '200,185,255' : '255,195,210')
            : '255,255,255'
        });
      }
    }

    /* ── ESTRELAS CADENTES ── */
    function spawnShootingStar() {
      const el = document.createElement('div');
      el.className = 'shooting-star';
      document.body.appendChild(el);

      const startX = Math.random() * window.innerWidth * 0.75;
      const startY = Math.random() * window.innerHeight * 0.4;
      const angle  = 22 + Math.random() * 22;
      const dist   = 160 + Math.random() * 130;
      const rad    = (angle * Math.PI) / 180;
      const endX   = startX + Math.cos(rad) * dist;
      const endY   = startY + Math.sin(rad) * dist;
      const dur    = 480 + Math.random() * 380;

      el.style.cssText = `left:${startX}px;top:${startY}px;opacity:0;`;

      const t0 = performance.now();
      function animStar(now) {
        const p    = Math.min((now - t0) / dur, 1);
        const fade = p < 0.15 ? p / 0.15 : 1 - (p - 0.15) / 0.85;
        el.style.opacity  = fade * 0.9;
        el.style.left     = (startX + (endX - startX) * p) + 'px';
        el.style.top      = (startY + (endY - startY) * p) + 'px';
        el.style.transform= `rotate(${angle}deg)`;
        p < 1 ? requestAnimationFrame(animStar) : el.remove();
      }
      requestAnimationFrame(animStar);

      setTimeout(spawnShootingStar, 3000 + Math.random() * 5000);
    }
    setTimeout(spawnShootingStar, 1800);

    /* ── RENDER LOOP ── */
    function drawStars(ts) {
      mouseX += (targetX - mouseX) * 0.04;
      mouseY += (targetY - mouseY) * 0.04;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const t = ts / 1000;

      for (const s of stars) {
        const px = mouseX * s.parallaxFactor * canvas.width;
        const py = mouseY * s.parallaxFactor * canvas.height;

        // drift horizontal lento por camada
        const sx = ((s.x + px + t * s.driftSpeed) % canvas.width  + canvas.width)  % canvas.width;
        const sy = ((s.y + py)                     % canvas.height + canvas.height) % canvas.height;

        // cintilação individual
        const a = 0.2 + 0.8 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * 10 + s.phase));

        // halo suave nas estrelas mais brilhantes
        if (s.layer === 2 && a > 0.82) {
          ctx.beginPath();
          ctx.arc(sx, sy, s.r * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${s.hue},${a * 0.1})`;
          ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.hue},${a})`;
        ctx.fill();
      }

      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    requestAnimationFrame(drawStars);

    /* ── POEMA ── */
    const intro   = document.getElementById('intro');
    const poemDiv = document.getElementById('poem');

    const introTexts = [
      "Poema de amor",
      "...",
      "Criado por Cabeça",
      "...",
      "Carregando poema"
    ];

    const poemText = `eu estaria mentindo se dissesse,
que você me deixa sem palavras,
a verdade é que você deixa minha língua
tão fraca que ela esquece a linguagem que fala
EU TE AMO MAIS QUE TUDO
❤❤❤.`;

    const author        = "\n\n— Cabeça · 02/04/2026";
    const fadeDuration  = 1000;
    const visibleDuration = 1500;
    const speed = 90;
    let i = 0;

    function showIntroTexts(index = 0) {
      if (index >= introTexts.length) {
        intro.style.display = 'none';
        poemDiv.style.display = 'block';
        typePoem();
        return;
      }

      intro.textContent = introTexts[index];
      intro.style.opacity = 0;

      setTimeout(() => {
        intro.style.opacity = 1;
        setTimeout(() => {
          intro.style.opacity = 0;
          setTimeout(() => { showIntroTexts(index + 1); }, fadeDuration);
        }, visibleDuration);
      }, 100);
    }

    function typePoem() {
      if (i < poemText.length) {
        poemDiv.innerHTML += poemText.charAt(i);
        i++;
        setTimeout(typePoem, speed);
      } else {
        setTimeout(() => {
          const authorTag = document.createElement("div");
          authorTag.className = "author";
          authorTag.textContent = author;
          poemDiv.appendChild(authorTag);
          setTimeout(() => { authorTag.style.opacity = 1; }, 50);
        }, 1000);
      }
    }

    showIntroTexts();
  </script>
</body>
</html>
